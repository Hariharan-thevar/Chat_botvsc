<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MomoStrap — MomoBot Support</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'DM Sans', sans-serif; }
    body {
      background: #0f0f1a;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }

    /* ── Chat container ─────────────────────────────── */
    .chat-wrap {
      width: 430px; height: 680px;
      background: #fff; border-radius: 24px;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55);
    }

    /* ── Header ─────────────────────────────────────── */
    .cb-header {
      padding: 16px 20px; background: #1a1a2e;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .hdr-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg,#e94560,#f5a623);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .hdr-info { flex: 1; }
    .hdr-name { font-family:'Sora',sans-serif; font-size:15px; font-weight:600; color:#fff; }
    .hdr-status { font-size:11px; color:#a0a0c0; display:flex; align-items:center; gap:5px; margin-top:2px; }
    .status-dot { width:7px; height:7px; background:#4ade80; border-radius:50%; }
    .clear-btn {
      background:rgba(255,255,255,0.1); border:none; border-radius:8px;
      padding:6px 11px; color:#fff; cursor:pointer; font-size:13px;
    }
    .clear-btn:hover { background:rgba(255,255,255,0.2); }

    /* ── Messages ────────────────────────────────────── */
    .msgs {
      flex:1; overflow-y:auto; padding:16px;
      display:flex; flex-direction:column; gap:10px;
      background:#fafafa;
    }
    .msgs::-webkit-scrollbar { width:4px; }
    .msgs::-webkit-scrollbar-thumb { background:#ddd; border-radius:2px; }

    .msg-row { display:flex; gap:8px; align-items:flex-end; max-width:88%; }
    .msg-row.bot  { align-self:flex-start; }
    .msg-row.user { align-self:flex-end; flex-direction:row-reverse; }

    .msg-av {
      width:30px; height:30px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:14px;
    }
    .msg-av.b { background:#1a1a2e; }
    .msg-av.u { background:#e94560; color:#fff; font-family:'Sora',sans-serif; font-size:11px; font-weight:600; }

    .msg-wrap { display:flex; flex-direction:column; }
    .bubble {
      padding:10px 14px; border-radius:16px;
      font-size:14px; line-height:1.55; word-break:break-word;
    }
    .bot  .bubble { background:#fff; color:#1a1a2e; border:1px solid #eee; border-bottom-left-radius:4px; }
    .user .bubble { background:#1a1a2e; color:#fff; border-bottom-right-radius:4px; }
    .bubble.err   { background:#fff0f0 !important; color:#c0392b !important; border-color:#f5c6cb !important; }

    .msg-time { font-size:10px; color:#aaa; margin-top:3px; }
    .user .msg-time { text-align:right; }

    /* ── Typing dots ─────────────────────────────────── */
    .typing-row { display:flex; gap:8px; align-items:flex-end; }
    .typing-bub {
      background:#fff; border:1px solid #eee; border-radius:16px;
      border-bottom-left-radius:4px; padding:12px 16px;
      display:flex; gap:4px; align-items:center;
    }
    .dot { width:7px; height:7px; background:#bbb; border-radius:50%; animation:bonce 1.2s infinite; }
    .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
    @keyframes bonce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── Quick replies ───────────────────────────────── */
    .qr-wrap { display:flex; flex-wrap:wrap; gap:6px; padding:4px 0 4px 38px; }
    .qr-btn {
      font-family:'DM Sans',sans-serif; font-size:12px;
      padding:5px 12px; border-radius:20px; cursor:pointer;
      border:1.5px solid #e94560; color:#e94560; background:transparent;
      transition:background .15s,color .15s; white-space:nowrap;
    }
    .qr-btn:hover { background:#e94560; color:#fff; }

    /* ── Input area ──────────────────────────────────── */
    .input-area {
      padding:12px 16px; border-top:1px solid #f0f0f0;
      background:#fff; flex-shrink:0;
    }
    .input-row { display:flex; gap:8px; align-items:flex-end; }
    .chat-input {
      flex:1; resize:none; border:1px solid #e0e0e0; border-radius:12px;
      padding:10px 14px; font-size:14px; font-family:'DM Sans',sans-serif;
      outline:none; max-height:100px; min-height:42px; line-height:1.4;
      background:#fafafa;
    }
    .chat-input:focus { border-color:#e94560; background:#fff; }
    .send-btn {
      width:42px; height:42px; border-radius:12px; border:none;
      background:#e94560; color:#fff; cursor:pointer;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
      transition:background .15s,transform .1s;
    }
    .send-btn:hover  { background:#c73050; }
    .send-btn:active { transform:scale(.95); }
    .send-btn:disabled { background:#f0a0b0; cursor:not-allowed; }
    .input-footer { font-size:10px; color:#bbb; text-align:center; margin-top:7px; }

    @media(max-width:480px){
      body { align-items:flex-end; }
      .chat-wrap { width:100vw; height:96vh; border-radius:24px 24px 0 0; }
    }
  </style>
</head>
<body>

<div class="chat-wrap">
  <!-- Header -->
  <div class="cb-header">
    <div class="hdr-avatar">🛍️</div>
    <div class="hdr-info">
      <div class="hdr-name">MomoBot</div>
      <div class="hdr-status"><span class="status-dot"></span> Online · MomoStrap Support</div>
    </div>
    <button class="clear-btn" onclick="clearChat()">🗑 Clear</button>
  </div>

  <!-- Messages -->
  <div class="msgs" id="msgs"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea class="chat-input" id="inp"
        placeholder="Ask about products, orders, returns…"
        rows="1"
        onkeydown="onKey(event)"
        oninput="resize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">Powered by Claude AI · MomoStrap Customer Support</div>
  </div>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  // Empty string = same server as the page (works on Render and locally).
  const API_BASE   = "AIzaSyCPuYeUHlkkoSHHuyA3XE8u4cUObnsiccg";
  const SESSION_ID = "s_" + Math.random().toString(36).slice(2, 10);
  let busy = false;

  // ── Helpers ───────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const now = () => new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});

  function resize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 100) + "px";
  }
  function onKey(e) { if (e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); } }
  function scrollEnd() { const c=$("msgs"); c.scrollTop=c.scrollHeight; }

  // ── Render a message bubble ────────────────────────────────────────────────
  function addMsg(role, html, opts={}) {
    const c=$("msgs"), isU=(role==="user");
    const row=document.createElement("div");
    row.className="msg-row "+(isU?"user":"bot");

    const av=document.createElement("div");
    av.className="msg-av "+(isU?"u":"b");
    av.textContent=isU?"You":"🛍️";

    const wrap=document.createElement("div"); wrap.className="msg-wrap";
    const bub=document.createElement("div");
    bub.className="bubble"+(opts.err?" err":"");
    bub.innerHTML=html.replace(/\n/g,"<br>");

    const t=document.createElement("div"); t.className="msg-time"; t.textContent=now();
    wrap.append(bub,t);
    row.append(av,wrap);
    c.appendChild(row);

    // Quick-reply buttons (bot only)
    if (!isU && opts.qr && opts.qr.length) {
      const qw=document.createElement("div"); qw.className="qr-wrap";
      opts.qr.forEach(label=>{
        const b=document.createElement("button"); b.className="qr-btn";
        b.textContent=label;
        b.onclick=()=>{ qw.remove(); send(label); };
        qw.appendChild(b);
      });
      c.appendChild(qw);
    }
    scrollEnd();
  }

  // ── Typing indicator ───────────────────────────────────────────────────────
  function showTyping() {
    const c=$("msgs");
    const row=document.createElement("div"); row.id="typing"; row.className="typing-row";
    const av=document.createElement("div"); av.className="msg-av b"; av.textContent="🛍️";
    const bub=document.createElement("div"); bub.className="typing-bub";
    bub.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    row.append(av,bub); c.appendChild(row); scrollEnd();
  }
  function hideTyping() { const t=$("typing"); if(t) t.remove(); }

  // ── Smart quick-reply suggestions ─────────────────────────────────────────
  function quickReplies(text) {
    const t=text.toLowerCase();
    if(t.includes("recommend")||t.includes("suggest")||t.includes("which"))
      return ["Show all products","Best for travel","Best for gym"];
    if(t.includes("order")||t.includes("track"))
      return ["Track my order","Cancel order"];
    if(t.includes("ship")||t.includes("deliver"))
      return ["Express shipping?","Free shipping threshold?"];
    if(t.includes("return")||t.includes("refund"))
      return ["Start a return","Talk to human"];
    return [];
  }

  // ── API call ───────────────────────────────────────────────────────────────
  async function callAPI(message) {
    const res = await fetch(API_BASE + "/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({session_id: SESSION_ID, message})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Server error " + res.status);
    return data.reply;
  }

  // ── Send message ───────────────────────────────────────────────────────────
  async function send(prefill) {
    const inp=$("inp");
    const msg=(prefill||inp.value).trim();
    if (!msg||busy) return;
    if (!prefill){ inp.value=""; inp.style.height="auto"; }

    busy=true; $("sendBtn").disabled=true;
    addMsg("user", msg);
    showTyping();

    try {
      const reply = await callAPI(msg);
      hideTyping();
      addMsg("assistant", reply, {qr: quickReplies(reply)});
    } catch(err) {
      hideTyping();
      addMsg("assistant",
        "⚠️ " + err.message + "<br><small>Make sure the Flask server is running.</small>",
        {err:true});
    }

    busy=false; $("sendBtn").disabled=false; inp.focus();
  }

  // ── Clear & welcome ────────────────────────────────────────────────────────
  function clearChat() {
    $("msgs").innerHTML=""; welcome();
  }

  function welcome() {
    addMsg("assistant",
      "Hey there! 👋 Welcome to <strong>MomoStrap</strong> support!\n\nI'm MomoBot — here to help with product recommendations, order tracking, returns, and more. What can I do for you today? 😊",
      {qr:["Browse products","Track my order","Return policy","Talk to human"]}
    );
  }

  welcome();
  $("inp").focus();
</script>
</body>
</html>
